name: Update Gas Prices

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch latest AAA gas prices
        run: python update_gas_prices.py

      - name: Commit updated HTML (if prices changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gas-tax-calculator.html
          if git diff --staged --quiet; then
            echo "Prices unchanged — no commit needed."
          else
            TODAY=$(date -u +'%B %-d, %Y')
            git commit -m "chore: update gas prices — ${TODAY}"
            git push
            echo "✅ Committed and pushed updated prices."
          fi
